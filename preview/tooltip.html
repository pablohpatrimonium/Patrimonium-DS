<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Tooltip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px 28px; background: #fff; font-family: var(--font-sans); }
  .head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
  .head .title { font: 700 18px/1 var(--font-display); color: var(--fg-1); }
  .head .sub { font: 500 12px/1.3 var(--font-mono); color: var(--fg-3); }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 56px 28px; padding: 40px 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .target { width: 44px; height: 44px; border-radius: 8px; background: var(--neutral-light); display: inline-grid; place-items: center; color: var(--brand-navy); position: relative; }
  .target svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .meta { font: 500 11px/1 var(--font-mono); color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }

  .tip {
    position: absolute;
    background: var(--brand-navy);
    color: #fff;
    font: 500 12px/1.3 var(--font-sans);
    padding: 7px 10px;
    border-radius: 8px;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(15,23,42,0.06), 0 4px 12px rgba(15,23,42,0.08);
  }
  .tip::after { content: ""; position: absolute; width: 0; height: 0; border: 5px solid transparent; }
  .top    { bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
  .top::after    { top: 100%; left: 50%; margin-left: -5px; border-top-color: var(--brand-navy); }
  .right  { left: calc(100% + 8px); top: 50%; transform: translateY(-50%); }
  .right::after  { right: 100%; top: 50%; margin-top: -5px; border-right-color: var(--brand-navy); }
  .bottom { top: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
  .bottom::after { bottom: 100%; left: 50%; margin-left: -5px; border-bottom-color: var(--brand-navy); }
  .left   { right: calc(100% + 8px); top: 50%; transform: translateY(-50%); }
  .left::after   { left: 100%; top: 50%; margin-top: -5px; border-left-color: var(--brand-navy); }
</style></head><body>
  <div class="head">
    <span class="title">Tooltip</span>
    <span class="sub">4 posições · fundo navy · radius 8 · seta 5px</span>
  </div>

  <div class="grid">
    <div class="item">
      <div class="target">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span class="tip top">Vence em 7 dias</span>
      </div>
      <span class="meta">top</span>
    </div>

    <div class="item">
      <div class="target">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span class="tip right">Copiar CNPJ</span>
      </div>
      <span class="meta">right</span>
    </div>

    <div class="item">
      <div class="target">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span class="tip bottom">Exportar PDF</span>
      </div>
      <span class="meta">bottom</span>
    </div>

    <div class="item">
      <div class="target">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span class="tip left">Arquivar</span>
      </div>
      <span class="meta">left</span>
    </div>
  </div>
</body></html>
