<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Empty state</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; font-family: var(--font-sans); }
  .head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .head .title { font: 700 18px/1 var(--font-display); color: var(--fg-1); }
  .head .sub { font: 500 12px/1.3 var(--font-mono); color: var(--fg-3); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 8px; }
  .empty {
    border: 1px solid var(--neutral-light);
    border-radius: 16px;
    padding: 36px 28px;
    display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;
    background: #fff;
  }
  .empty .ill {
    width: 88px; height: 88px;
    border-radius: 999px;
    background: var(--info-bg);
    color: var(--brand-navy);
    display: grid; place-items: center;
  }
  .empty .ill svg { width: 44px; height: 44px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .empty h3 { margin: 0; font: 600 20px/1.25 var(--font-display); color: var(--fg-1); letter-spacing: -0.005em; }
  .empty p { margin: 0; font: 400 14px/1.5 var(--font-sans); color: var(--fg-3); max-width: 320px; text-wrap: pretty; }
  .btn-primary { font: 600 14px/1 var(--font-sans); background: var(--brand-navy); color: #fff; border: 0; border-radius: 8px; padding: 11px 18px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .btn-ghost { font: 600 14px/1 var(--font-sans); background: transparent; color: var(--brand-navy); border: 0; border-radius: 8px; padding: 11px 18px; cursor: pointer; }

  /* search empty */
  .empty.search .ill { background: var(--neutral-light); color: var(--fg-2); }
</style></head><body>
  <div class="head">
    <span class="title">Empty state</span>
    <span class="sub">Ilustração simples · título · explicação · CTA</span>
  </div>

  <div class="grid">
    <div class="empty">
      <div class="ill">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </div>
      <h3>Você ainda não tem documentos</h3>
      <p>Importe seu primeiro CNPJ ou cole uma NFe para começar a acompanhar obrigações fiscais.</p>
      <button class="btn-primary"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Adicionar documento</button>
    </div>

    <div class="empty search">
      <div class="ill">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <h3>Sem resultados para "12.345"</h3>
      <p>Tente buscar por CNPJ completo, razão social ou número da nota fiscal.</p>
      <button class="btn-ghost">Limpar filtros</button>
    </div>
  </div>
</body></html>
