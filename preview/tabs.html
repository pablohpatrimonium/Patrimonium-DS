<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Tabs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; font-family: var(--font-sans); }
  .head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .head .title { font: 700 18px/1 var(--font-display); color: var(--fg-1); }
  .head .sub { font: 500 12px/1.3 var(--font-mono); color: var(--fg-3); }

  .meta { font: 500 11px/1 var(--font-mono); color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; margin: 22px 0 10px; }

  /* underline tabs */
  .tabs-u { display: flex; gap: 4px; border-bottom: 1px solid var(--neutral-light); }
  .tabs-u .tab {
    font: 600 14px/1 var(--font-sans);
    padding: 12px 14px;
    color: var(--fg-3);
    cursor: pointer;
    border: 0;
    background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tabs-u .tab .count { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: var(--neutral-light); color: var(--fg-2); }
  .tabs-u .tab.active { color: var(--brand-navy); border-bottom-color: var(--brand-navy); }
  .tabs-u .tab.active .count { background: var(--info-bg); color: var(--brand-navy); }
  .tabs-u .tab:hover { color: var(--brand-navy); }

  /* pill tabs (segmented) */
  .tabs-p { display: inline-flex; padding: 4px; background: var(--neutral-surface); border-radius: 8px; gap: 2px; }
  .tabs-p .tab {
    font: 600 13px/1 var(--font-sans);
    padding: 8px 14px;
    color: var(--fg-3);
    border: 0;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
  }
  .tabs-p .tab.active { background: #fff; color: var(--brand-navy); box-shadow: 0 1px 2px rgba(15,23,42,0.06); }
</style></head><body>
  <div class="head">
    <span class="title">Tabs</span>
    <span class="sub">Underline (padrão) · Pill (segmented control)</span>
  </div>

  <div class="meta">Underline</div>
  <div class="tabs-u">
    <button class="tab active">Visão geral</button>
    <button class="tab">Documentos <span class="count">128</span></button>
    <button class="tab">Notas fiscais <span class="count">3.4k</span></button>
    <button class="tab">Obrigações</button>
    <button class="tab">Equipe</button>
  </div>

  <div class="meta">Pill / segmented</div>
  <div class="tabs-p">
    <button class="tab active">Mês</button>
    <button class="tab">Trimestre</button>
    <button class="tab">Ano</button>
  </div>
</body></html>
