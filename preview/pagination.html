<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Pagination</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; font-family: var(--font-sans); }
  .head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .head .title { font: 700 18px/1 var(--font-display); color: var(--fg-1); }
  .head .sub { font: 500 12px/1.3 var(--font-mono); color: var(--fg-3); }

  .meta { font: 500 11px/1 var(--font-mono); color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; margin: 22px 0 10px; }

  .pager { display: flex; align-items: center; gap: 6px; }
  .pager .info { color: var(--fg-3); font-size: 13px; font-variant-numeric: tabular-nums; margin-right: auto; }
  .pager button {
    min-width: 36px; height: 36px; padding: 0 10px;
    border: 1px solid var(--neutral-light); background: #fff;
    border-radius: 8px; cursor: pointer; color: var(--fg-2);
    font: 600 14px/1 var(--font-sans); font-variant-numeric: tabular-nums;
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  }
  .pager button:hover { background: var(--neutral-surface); }
  .pager button.active { background: var(--brand-navy); color: #fff; border-color: var(--brand-navy); }
  .pager button:disabled { color: var(--neutral-light); cursor: not-allowed; background: #fff; }
  .pager button.icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .pager .ellipsis { color: var(--neutral-light); padding: 0 4px; }

  .full { display: flex; align-items: center; }
  .full .pager { margin-left: auto; }
</style></head><body>
  <div class="head">
    <span class="title">Pagination</span>
    <span class="sub">Números + prev/next · "Mostrando 1–20 de 248"</span>
  </div>

  <div class="meta">Default</div>
  <div class="pager">
    <button class="icon" disabled><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="active">1</button>
    <button>2</button>
    <button>3</button>
    <button>4</button>
    <span class="ellipsis">…</span>
    <button>13</button>
    <button class="icon"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>

  <div class="meta">Com info</div>
  <div class="full">
    <span style="color: var(--fg-3); font-size: 13px; font-variant-numeric: tabular-nums;">Mostrando <b style="color: var(--fg-1)">1–20</b> de <b style="color: var(--fg-1)">248</b></span>
    <div class="pager">
      <button class="icon" disabled><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="active">1</button>
      <button>2</button>
      <button>3</button>
      <span class="ellipsis">…</span>
      <button>13</button>
      <button class="icon"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>
</body></html>
