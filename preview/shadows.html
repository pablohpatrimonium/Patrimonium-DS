<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #fff; display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; font-family: var(--font-sans); }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .card { width: 150px; height: 90px; border-radius: 16px; background: #fff; }
  .name { font: 600 13px/1 var(--font-mono); color: var(--fg-1); }
  .use  { font: 400 11px/1.35 var(--font-sans); color: var(--fg-3); text-align: center; max-width: 170px; }
</style></head><body>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-1)"></div>
    <span class="name">shadow-1</span>
    <span class="use">encostado na superfície — cards, painéis, listas</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-2)"></div>
    <span class="name">shadow-2</span>
    <span class="use">levemente flutuando — hover, dropdown, tooltip, toast</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow: var(--shadow-3)"></div>
    <span class="name">shadow-3</span>
    <span class="use">claramente acima de tudo — modal, drawer, overlay</span>
  </div>
</body></html>
