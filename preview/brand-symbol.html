<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Symbol</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: #fff; display: grid; grid-template-columns: repeat(3, 1fr); }
  .pane { padding: 22px; display: grid; place-items: center; min-height: 200px; }
  .pane.light { background: #fff; }
  .pane.tint  { background: #F7F8FB; }
  .pane.dark  { background: var(--brand-navy); }
  img { width: 130px; height: 130px; object-fit: contain; }
  .lbl { position: absolute; bottom: 12px; left: 0; right: 0; text-align: center; font: 500 11px/1 var(--font-mono); color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .pane.dark .lbl { color: rgba(255,255,255,0.6); }
  .pane { position: relative; }
</style></head><body>
  <div class="pane light"><img src="../assets/simbolo-principal.png"><span class="lbl">P-cápsula · principal</span></div>
  <div class="pane tint"><img src="../assets/simbolo-azul.png"><span class="lbl">azul</span></div>
  <div class="pane dark"><img src="../assets/simbolo-negativo.png"><span class="lbl">negativo</span></div>
</body></html>
