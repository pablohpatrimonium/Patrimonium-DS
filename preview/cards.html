<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #F7F8FB; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; }
  .ov { font: 600 11px/1 var(--font-sans); color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .big { font: 700 28px/1.1 var(--font-display); color: var(--fg-1); margin: 8px 0 4px; }
  .sub { font: 400 13px/1.3 var(--font-sans); color: var(--fg-3); margin-bottom: 12px; }
  .b   { display: inline-flex; padding: 4px 10px; border-radius: 999px; font: 600 12px/1 var(--font-sans); background: var(--success-bg); color: var(--success); }
  .doc { display: flex; gap: 12px; align-items: flex-start; }
  .icon { width: 36px; height: 36px; border-radius: 8px; background: var(--info-bg); display: grid; place-items: center; color: var(--brand-navy); flex-shrink: 0; }
  .doc h4 { margin: 0; font: 600 16px/1.2 var(--font-display); color: var(--brand-navy); }
  .doc p { margin: 4px 0 8px; font-size: 13px; color: var(--fg-3); }
  .dot { display: inline-flex; align-items: center; gap: 6px; font: 500 13px/1 var(--font-sans); color: var(--success); }
  .dot::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: currentColor; }
</style></head><body>
  <div class="card">
    <span class="ov">Recuperação tributária</span>
    <div class="big">R$ 12.480,00</div>
    <div class="sub">recuperados no último trimestre</div>
    <span class="b">+18% vs Q3</span>
  </div>
  <div class="card doc">
    <div class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 14 11 16 15 12"/></svg></div>
    <div>
      <h4>Certificado A1</h4>
      <p>Válido até 28/04/2027</p>
      <span class="dot">Ativo</span>
    </div>
  </div>
</body></html>
