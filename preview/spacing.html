<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .item { display: grid; grid-template-columns: 92px 1fr 100px 1fr; align-items: center; gap: 14px; }
  .bar { height: 14px; background: var(--brand-navy); border-radius: 3px; }
  .name { font: 600 12px/1 var(--font-mono); color: var(--fg-1); }
  .val { font: 500 11px/1 var(--font-mono); color: var(--fg-3); text-align: right; }
  .tag { font: 500 10px/1 var(--font-sans); padding: 3px 7px; border-radius: 999px; justify-self: start; letter-spacing: 0.02em; }
  .tag.pref  { background: #E6F7EF; color: #1F8F5C; }
  .tag.exc   { background: #FEF3C7; color: #B07012; }
  .tag.raro  { background: #FEE2E2; color: #B91C1C; }
</style></head><body>
<div class="row">
  <div class="item"><span class="name">space-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span><span class="tag pref">preferencial</span></div>
  <div class="item"><span class="name">space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span><span class="tag pref">preferencial</span></div>
  <div class="item"><span class="name">space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span><span class="tag exc">exceção</span></div>
  <div class="item"><span class="name">space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span><span class="tag pref">preferencial</span></div>
  <div class="item"><span class="name">space-5</span><div class="bar" style="width:20px"></div><span class="val">20px</span><span class="tag raro">uso raro</span></div>
  <div class="item"><span class="name">space-6</span><div class="bar" style="width:24px"></div><span class="val">24px</span><span class="tag pref">preferencial</span></div>
  <div class="item"><span class="name">space-7</span><div class="bar" style="width:32px"></div><span class="val">32px</span><span class="tag pref">preferencial</span></div>
  <div class="item"><span class="name">space-8</span><div class="bar" style="width:40px"></div><span class="val">40px</span><span class="tag raro">uso raro</span></div>
  <div class="item"><span class="name">space-9</span><div class="bar" style="width:48px"></div><span class="val">48px</span><span class="tag exc">exceção</span></div>
  <div class="item"><span class="name">space-10</span><div class="bar" style="width:64px"></div><span class="val">64px</span><span class="tag pref">preferencial</span></div>
  <div class="item"><span class="name">space-11</span><div class="bar" style="width:80px"></div><span class="val">80px</span><span class="tag exc">exceção</span></div>
</div>
</body></html>
