<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Loading states</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: #fff; font-family: var(--font-sans); }
  .head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .head .title { font: 700 18px/1 var(--font-display); color: var(--fg-1); }
  .head .sub { font: 500 12px/1.3 var(--font-mono); color: var(--fg-3); }
  .meta { font: 500 11px/1 var(--font-mono); color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; margin: 22px 0 10px; }

  /* Skeleton */
  .skel { background: linear-gradient(90deg, #F1F4F9 0%, #E2E6F1 50%, #F1F4F9 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 8px; }
  @keyframes shimmer { from { background-position: 200% 0 } to { background-position: -200% 0 } }
  .skel.line { height: 10px; }
  .skel.title { height: 16px; width: 50%; }
  .skel.text { width: 100%; }
  .skel.text.short { width: 70%; }
  .skel.box  { height: 64px; border-radius: 8px; }
  .skel.circle { width: 40px; height: 40px; border-radius: 999px; }

  .card { border: 1px solid var(--neutral-light); border-radius: 16px; padding: 18px; display: flex; flex-direction: column; gap: 10px; max-width: 320px; }
  .card.row { flex-direction: row; align-items: center; }

  /* Spinner */
  .spin { display: inline-block; border-radius: 999px; border: 2.5px solid var(--neutral-light); border-top-color: var(--brand-navy); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin.sm { width: 16px; height: 16px; border-width: 2px; }
  .spin.md { width: 24px; height: 24px; }
  .spin.lg { width: 40px; height: 40px; border-width: 3px; }

  .row-demo { display: flex; gap: 28px; align-items: center; }
  .lbl { font: 500 11px/1 var(--font-mono); color: var(--fg-3); }

  /* Progress */
  .progress-set { display: flex; flex-direction: column; gap: 14px; max-width: 480px; }
  .prog { height: 8px; background: var(--neutral-light); border-radius: 999px; overflow: hidden; }
  .prog .fill { height: 100%; background: var(--brand-navy); border-radius: 999px; transition: width 200ms; }
  .prog.indet { position: relative; }
  .prog.indet::after { content:""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, var(--brand-navy), transparent); width: 40%; animation: slide 1.4s ease-in-out infinite; border-radius: 999px; }
  @keyframes slide { 0% { left: -40% } 100% { left: 100% } }
  .prog-row { display: grid; grid-template-columns: 100px 1fr 40px; align-items: center; gap: 12px; font: 500 12px/1 var(--font-mono); color: var(--fg-3); font-variant-numeric: tabular-nums; }
  .prog-row b { color: var(--fg-1); text-align: right; }
</style></head><body>
  <div class="head">
    <span class="title">Loading states</span>
    <span class="sub">Skeleton · Spinner · Progress bar</span>
  </div>

  <div class="meta">Skeleton — bloco de texto, card e row</div>
  <div style="display: flex; gap: 18px; flex-wrap: wrap;">
    <div class="card">
      <div class="skel title"></div>
      <div class="skel line text"></div>
      <div class="skel line text"></div>
      <div class="skel line text short"></div>
    </div>
    <div class="card">
      <div class="skel box"></div>
      <div class="skel line text"></div>
      <div class="skel line text short"></div>
    </div>
    <div class="card row">
      <div class="skel circle"></div>
      <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
        <div class="skel line" style="width: 60%"></div>
        <div class="skel line" style="width: 40%"></div>
      </div>
    </div>
  </div>

  <div class="meta">Spinner — sm / md / lg</div>
  <div class="row-demo">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;"><span class="spin sm"></span><span class="lbl">16</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;"><span class="spin md"></span><span class="lbl">24</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;"><span class="spin lg"></span><span class="lbl">40</span></div>
  </div>

  <div class="meta">Progress bar — determinada e indeterminada</div>
  <div class="progress-set">
    <div class="prog-row"><span>0%</span><div class="prog"><div class="fill" style="width:0%"></div></div><b>0</b></div>
    <div class="prog-row"><span>25%</span><div class="prog"><div class="fill" style="width:25%"></div></div><b>25</b></div>
    <div class="prog-row"><span>62%</span><div class="prog"><div class="fill" style="width:62%"></div></div><b>62</b></div>
    <div class="prog-row"><span>100%</span><div class="prog"><div class="fill" style="width:100%"></div></div><b>100</b></div>
    <div class="prog-row"><span>indet.</span><div class="prog indet"></div><b>—</b></div>
  </div>
</body></html>
