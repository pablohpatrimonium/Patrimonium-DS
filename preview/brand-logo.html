<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: #fff; display: grid; grid-template-columns: 1fr 1fr; }
  .pane { padding: 22px; display: grid; place-items: center; min-height: 180px; }
  .pane.light { background: #fff; }
  .pane.dark  { background: var(--brand-navy); }
  img { max-width: 220px; max-height: 110px; object-fit: contain; }
</style></head><body>
  <div class="pane light"><img src="../assets/logo-principal.png" alt="Logo principal"></div>
  <div class="pane dark"><img src="../assets/logo-negativa.png" alt="Logo negativa"></div>
</body></html>
