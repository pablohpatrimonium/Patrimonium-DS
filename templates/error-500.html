<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Template · 500</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { height: 100%; }
    body { margin: 0; background: #fff; font-family: var(--font-sans); color: var(--brand-navy); }
    .stage {
      min-height: 100vh;
      display: grid; place-items: center;
      padding: 40px 28px;
    }
    .frame {
      max-width: 480px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .num {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 96px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--brand-navy);
      margin: 0;
    }
    h1 {
      margin: 32px 0 0;
      font: 700 40px/1.1 var(--font-display);
      letter-spacing: -0.01em;
      color: var(--brand-navy);
    }
    .lead {
      margin: 16px 0 0;
      font: 400 16px/1.5 var(--font-sans);
      color: var(--neutral);
    }

    /* alert inline warning · texto alinhado à esquerda */
    .alert {
      width: 100%;
      margin-top: 24px;
      padding: 12px 16px;
      background: #FAEEDA; /* --warning-bg */
      border-radius: 8px;
      display: flex; gap: 12px; align-items: flex-start;
      text-align: left;
      box-sizing: border-box;
    }
    .alert svg {
      width: 20px; height: 20px;
      stroke: #BA7517; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }
    .alert .body { flex: 1; min-width: 0; }
    .alert .body b {
      display: block;
      font: 700 14px/1.3 var(--font-sans);
      color: #854F0B;
      margin-bottom: 2px;
    }
    .alert .body p {
      margin: 0;
      font: 400 14px/1.45 var(--font-sans);
      color: #854F0B;
    }
    .alert .body code {
      font: 500 14px/1.45 var(--font-mono);
      color: #854F0B;
    }

    .actions {
      display: flex; gap: 12px;
      margin-top: 32px;
      justify-content: center; align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      font: 500 16px/1 var(--font-sans);
      border: 1.5px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 150ms;
    }
    .btn.primary { background: var(--brand-navy); color: #fff; padding: 12px 24px; }
    .btn.primary:hover { background: #122555; }
    .btn.secondary { background: #fff; color: var(--brand-navy); border-color: var(--brand-navy); padding: 12px 24px; }
    .btn.secondary:hover { background: var(--info-bg); }
    .btn.ghost { background: transparent; color: var(--brand-navy); padding: 12px 16px; }
    .btn.ghost:hover { background: var(--neutral-surface); }
  </style>
</head>
<body>

<div class="stage">
  <div class="frame">
    <p class="num">500</p>
    <h1>Algo deu errado no nosso lado</h1>
    <p class="lead">Estamos trabalhando para resolver. Tente novamente em alguns minutos ou volte para a página inicial. Se o problema persistir, fale com o suporte.</p>

    <div class="alert">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div class="body">
        <b>Código do erro</b>
        <p>Inclua este código ao falar com o suporte: <code>ERR-2026-5187</code></p>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary">Tentar novamente</button>
      <button class="btn secondary">Voltar para Dashboard</button>
      <button class="btn ghost">Falar com suporte</button>
    </div>
  </div>
</div>

</body>
</html>
